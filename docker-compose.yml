version: '3.8'

services:
  rankagile:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development setup (optional)
  rankagile-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
      - "8001:8000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./api:/app/api
      - ./frontend:/app/frontend
      - /app/node_modules
      - /app/api/node_modules
      - /app/frontend/node_modules
    profiles:
      - dev
